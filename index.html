<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tareas Cloud</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="bg-slate-950 text-white min-h-screen">
    <!-- HEADER -->
    <header class="text-center py-8">
      <h1 class="text-3xl font-bold">Tareas Colaborativas</h1>
      <p class="text-slate-400">Cloud Computing — UAB FIT</p>
    </header>

    <main class="max-w-3xl mx-auto px-4 space-y-6">
      <!-- FORM -->
      <section class="bg-slate-900 p-6 rounded-xl border border-slate-800">
        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
          <i data-lucide="plus-circle"></i> Nueva tarea
        </h2>

        <input
          id="titulo"
          class="w-full p-3 mb-3 rounded bg-slate-800 border border-slate-700"
          placeholder="Título"
        />

        <input
          id="responsable"
          class="w-full p-3 mb-3 rounded bg-slate-800 border border-slate-700"
          placeholder="Responsable"
        />

        <button
          onclick="agregarTarea()"
          class="w-full bg-emerald-500 hover:bg-emerald-600 p-3 rounded flex justify-center gap-2 items-center"
        >
          <i data-lucide="check"></i> Agregar
        </button>
      </section>

      <!-- SEARCH -->
      <section class="bg-slate-900 p-4 rounded-xl border border-slate-800">
        <input
          id="busqueda"
          oninput="buscarTareas()"
          class="w-full p-3 rounded bg-slate-800 border border-slate-700"
          placeholder="Buscar tareas..."
        />
      </section>

      <!-- LIST -->
      <section class="bg-slate-900 p-6 rounded-xl border border-slate-800">
        <div class="flex justify-between mb-4">
          <h2 class="flex items-center gap-2 font-semibold">
            <i data-lucide="list"></i> Tareas
          </h2>
          <span id="contador" class="text-emerald-400"></span>
        </div>

        <div id="tareas-container" class="space-y-3"></div>
      </section>
    </main>

    <!-- TOAST -->
    <div
      id="toast"
      class="hidden fixed top-5 right-5 px-4 py-3 rounded-lg shadow"
    ></div>

    <!-- MODAL EDIT -->
    <div
      id="modal"
      class="hidden fixed inset-0 bg-black/60 flex items-center justify-center"
    >
      <div class="bg-slate-900 p-6 rounded-xl w-96 border border-slate-700">
        <h2 class="text-lg mb-4">Editar tarea</h2>

        <input id="editTitulo" class="w-full p-2 mb-3 bg-slate-800 rounded" />

        <input
          id="editResponsable"
          class="w-full p-2 mb-4 bg-slate-800 rounded"
        />

        <div class="flex justify-end gap-2">
          <button
            onclick="cerrarModal()"
            class="px-3 py-2 bg-slate-700 rounded"
          >
            Cancelar
          </button>

          <button
            onclick="guardarEdicion()"
            class="px-3 py-2 bg-emerald-500 rounded"
          >
            Guardar
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL DELETE -->
    <div
      id="confirmDelete"
      class="hidden fixed inset-0 bg-black/60 flex items-center justify-center"
    >
      <div
        class="bg-slate-900 p-6 rounded-xl w-80 text-center border border-slate-700"
      >
        <h2 class="mb-4 text-lg">¿Eliminar tarea?</h2>

        <div class="flex justify-center gap-3">
          <button
            onclick="cerrarDelete()"
            class="px-3 py-2 bg-slate-700 rounded"
          >
            Cancelar
          </button>

          <button
            onclick="confirmarEliminar()"
            class="px-3 py-2 bg-red-500 rounded"
          >
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>

    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
